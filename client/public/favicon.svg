<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Subtle background glow -->
  <circle cx="50" cy="50" r="35" fill="url(#logoGrad)" opacity="0.15" filter="url(#logoGlow)"/>

  <!-- Outer Hexagon frame -->
  <path
    d="M50 12 L83 31 L83 69 L50 88 L17 69 L17 31 Z"
    stroke="url(#logoGrad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Left bracket -->
  <path
    d="M38 42 L28 50 L38 58"
    stroke="url(#logoGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right bracket -->
  <path
    d="M62 42 L72 50 L62 58"
    stroke="url(#logoGrad)"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Center lightning bolt -->
  <path
    d="M50 32 L44 52 L56 48 L50 68"
    stroke="url(#glowGrad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Micro-spark dots -->
  <circle cx="50" cy="24" r="2" fill="#39d353"/>
  <circle cx="28" cy="65" r="1.5" fill="#7c3aed"/>
  <circle cx="72" cy="65" r="1.5" fill="#3b82f6"/>
</svg>
